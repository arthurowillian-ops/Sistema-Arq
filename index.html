<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFP85eQsSJDrx-klldmjtHe2oEx1jzrns",
            authDomain: "arquitetura-855d5.firebaseapp.com",
            projectId: "arquitetura-855d5",
            storageBucket: "arquitetura-855d5.firebasestorage.app",
            messagingSenderId: "82859867262",
            appId: "1:82859867262:web:cd5ef29765d57fdc5eec2f",
            databaseURL: "https://arquitetura-855d5-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const syncRef = ref(db, 'sceneState');

        // Estado inicial padrão caso o banco esteja totalmente vazio
        const defaultState = {
            solarPos: 90, lightIntensity: 2.0, ambientIntensity: 0.5,
            bgColor: "#070a13", gridVisible: true, groundMesh: "none",
            posX: 0, posY: 0, posZ: 0, scale: 1, rotY: 0
        };

        // Verifica se já existem dados salvos ao iniciar; se não houver, cria os padrões
        get(syncRef).then((snapshot) => {
            if (!snapshot.exists()) {
                set(syncRef, defaultState);
            }
        });

        // Função Global para salvar alterações no Firebase de forma automática
        window.dbSave = function(key, value) {
            let parsedValue = value;
            
            // Tratamento de booleanos vindos de checkboxes
            if (value === true || value === false) {
                parsedValue = value;
            } else if(!isNaN(value) && value !== '') {
                parsedValue = parseFloat(value);
            }
            
            // Atualiza apenas a propriedade modificada no Firebase
            update(syncRef, { [key]: parsedValue }).catch((error) => {
                console.error("Erro ao salvar no Firebase: ", error);
            });
        };

        window.triggerResetTransform = function() {
            update(syncRef, { posX: 0, posY: 0, posZ: 0, scale: 1, rotY: 0 });
        };

        window.triggerClearModel = function() {
            if(confirm("Isso irá resetar as configurações de todos os operadores. Continuar?")){
                set(syncRef, defaultState);
                clearModel();
            }
        };

        // Ouvinte em tempo real: Garante o salvamento automático e a reprodução em outros aparelhos
        onValue(syncRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // Sincronizar Iluminação e Sol
            if(data.solarPos !== undefined) {
                const el = document.getElementById('prop-solar-pos');
                if(document.activeElement !== el) el.value = data.solarPos;
                updateSolarOrbit(data.solarPos);
            }
            if(data.lightIntensity !== undefined) {
                const el = document.getElementById('prop-light');
                if(document.activeElement !== el) el.value = data.lightIntensity;
            }
            if(data.ambientIntensity !== undefined) {
                const el = document.getElementById('prop-ambient');
                if(document.activeElement !== el) el.value = data.ambientIntensity;
            }
            updateLighting(data.lightIntensity, data.ambientIntensity);

            // Sincronizar Ambiente
            if(data.bgColor !== undefined) {
                document.getElementById('prop-bg-color').value = data.bgColor;
                updateBackground(data.bgColor);
            }
            if(data.gridVisible !== undefined) {
                document.getElementById('prop-grid-toggle').checked = data.gridVisible;
                toggleGrid(data.gridVisible);
            }
            if(data.groundMesh !== undefined) {
                document.getElementById('prop-ground-mesh').value = data.groundMesh;
                updateGroundMesh(data.groundMesh);
            }

            // Sincronizar Transformações (Evita atualizar o input que o usuário está digitando ativamente)
            if(data.posX !== undefined) {
                const r = document.getElementById('move-x');
                const n = document.getElementById('move-x-num');
                if(document.activeElement !== r && document.activeElement !== n) {
                    r.value = data.posX; n.value = data.posX;
                }
                modelOffset.x = data.posX;
            }
            if(data.posY !== undefined) {
                const r = document.getElementById('move-y');
                const n = document.getElementById('move-y-num');
                if(document.activeElement !== r && document.activeElement !== n) {
                    r.value = data.posY; n.value = data.posY;
                }
                modelOffset.y = data.posY;
            }
            if(data.posZ !== undefined) {
                const r = document.getElementById('move-z');
                const n = document.getElementById('move-z-num');
                if(document.activeElement !== r && document.activeElement !== n) {
                    r.value = data.posZ; n.value = data.posZ;
                }
                modelOffset.z = data.posZ;
            }
            if(data.scale !== undefined) {
                const r = document.getElementById('scale-m');
                const n = document.getElementById('scale-m-num');
                if(document.activeElement !== r && document.activeElement !== n) {
                    r.value = data.scale; n.value = data.scale;
                }
                modelScale = data.scale;
                if(currentModel) currentModel.scale.set(modelScale, modelScale, modelScale);
            }
            if(data.rotY !== undefined) {
                const r = document.getElementById('rot-y');
                const n = document.getElementById('rot-y-num');
                if(document.activeElement !== r && document.activeElement !== n) {
                    r.value = data.rotY; n.value = data.rotY;
                }
                modelRotationY = data.rotY;
                if(currentModel) currentModel.rotation.y = THREE.MathUtils.degToRad(modelRotationY);
            }

            // Aplica as mudanças físicas no modelo 3D do Three.js
            updateModelTransform();
        });
    </script>

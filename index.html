<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Maquetes 3D Interativo</title>
    <style>
        :root {
            --bg-color: #070a13;
            --panel-bg: rgba(15, 22, 42, 0.85);
            --text-color: #f1f5f9;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Interface de Controle */
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: grid;
            grid-template-columns: 320px 1fr;
            padding: 20px;
            gap: 20px;
        }

        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            overflow-y: auto;
            max-height: calc(100vh - 40px);
        }

        h2 {
            font-size: 1.2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            color: #93c5fd;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            flex: 1;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        input[type="number"], select, input[type="color"] {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 6px;
            border-radius: 6px;
            font-size: 0.85rem;
            text-align: center;
        }

        input[type="number"] { width: 65px; }
        input[type="color"] { width: 50px; height: 32px; padding: 2px; cursor: pointer; }
        select { width: 100%; cursor: pointer; text-align-last: center; }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn:hover { background: var(--accent-hover); }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #dc2626; }

        /* Botão de Upload Invisível customizado */
        .file-upload-btn {
            border: 2px dashed var(--border-color);
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .file-upload-btn:hover { border-color: var(--accent-color); }

        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #070a13;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 15px;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p id="loading-text">Inicializando Banco de Dados...</p>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-container">
        <div class="panel">
            <h2>Arquivo Maquete</h2>
            <label class="file-upload-btn">
                <span>Selecionar arquivo .GLB / .GLTF</span>
                <input type="file" id="file-input" accept=".glb,.gltf" style="display: none;">
            </label>
            <button class="btn btn-danger" onclick="triggerClearModel()">Remover Maquete</button>

            <h2>Iluminação Solar</h2>
            <div class="control-group">
                <label>Órbita do Sol (Graus)</label>
                <div class="input-row">
                    <input type="range" id="prop-solar-pos" min="0" max="360" value="90" oninput="dbSave('solarPos', this.value)">
                </div>
            </div>
            <div class="control-group">
                <label>Intensidade do Sol</label>
                <div class="input-row">
                    <input type="range" id="prop-light" min="0" max="10" step="0.1" value="2" oninput="dbSave('lightIntensity', this.value)">
                </div>
            </div>
            <div class="control-group">
                <label>Luz Ambiente</label>
                <div class="input-row">
                    <input type="range" id="prop-ambient" min="0" max="2" step="0.05" value="0.5" oninput="dbSave('ambientIntensity', this.value)">
                </div>
            </div>

            <h2>Cenário & Fundo</h2>
            <div class="control-group">
                <label>Cor do Fundo</label>
                <input type="color" id="prop-bg-color" value="#070a13" onchange="dbSave('bgColor', this.value)">
            </div>
            <label class="checkbox-row">
                <input type="checkbox" id="prop-grid-toggle" checked onchange="dbSave('gridVisible', this.checked)">
                <span>Exibir Grade Guia</span>
            </label>
            <div class="control-group">
                <label>Malha de Piso</label>
                <select id="prop-ground-mesh" onchange="dbSave('groundMesh', this.value)">
                    <option value="none">Nenhum (Vazio)</option>
                    <option value="grid">Piso Técnico Escuro</option>
                    <option value="shadow">Apenas Sombra Recebida</option>
                </select>
            </div>

            <h2>Ajuste de Posição (X, Y, Z)</h2>
            <div class="control-group">
                <label>Posição X (Lateral)</label>
                <div class="input-row">
                    <input type="range" id="move-x" min="-50" max="50" step="0.5" value="0" oninput="document.getElementById('move-x-num').value=this.value; dbSave('posX', this.value)">
                    <input type="number" id="move-x-num" value="0" step="0.5" onchange="document.getElementById('move-x').value=this.value; dbSave('posX', this.value)">
                </div>
            </div>
            <div class="control-group">
                <label>Posição Y (Altura)</label>
                <div class="input-row">
                    <input type="range" id="move-y" min="-20" max="50" step="0.5" value="0" oninput="document.getElementById('move-y-num').value=this.value; dbSave('posY', this.value)">
                    <input type="number" id="move-y-num" value="0" step="0.5" onchange="document.getElementById('move-y').value=this.value; dbSave('posY', this.value)">
                </div>
            </div>
            <div class="control-group">
                <label>Posição Z (Profundidade)</label>
                <div class="input-row">
                    <input type="range" id="move-z" min="-50" max="50" step="0.5" value="0" oninput="document.getElementById('move-z-num').value=this.value; dbSave('posZ', this.value)">
                    <input type="number" id="move-z-num" value="0" step="0.5" onchange="document.getElementById('move-z').value=this.value; dbSave('posZ', this.value)">
                </div>
            </div>

            <h2>Escala & Rotação</h2>
            <div class="control-group">
                <label>Tamanho (Escala)</label>
                <div class="input-row">
                    <input type="range" id="scale-m" min="0.05" max="10" step="0.05" value="1" oninput="document.getElementById('scale-m-num').value=this.value; dbSave('scale', this.value)">
                    <input type="number" id="scale-m-num" value="1" step="0.05" onchange="document.getElementById('scale-m').value=this.value; dbSave('scale', this.value)">
                </div>
            </div>
            <div class="control-group">
                <label>Rotação Horizontal (Y)</label>
                <div class="input-row">
                    <input type="range" id="rot-y" min="0" max="360" step="1" value="0" oninput="document.getElementById('rot-y-num').value=this.value; dbSave('rotY', this.value)">
                    <input type="number" id="rot-y-num" value="0" step="1" onchange="document.getElementById('rot-y').value=this.value; dbSave('rotY', this.value)">
                </div>
            </div>
            <button class="btn" onclick="triggerResetTransform()">Resetar Posição</button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let dirLight, hemiLight, gridHelper, groundPlane;
        
        // Variáveis de controle do modelo carregado localmente
        let currentModel = null;
        let modelOffset = { x: 0, y: 0, z: 0 };
        let modelScale = 1;
        let modelRotationY = 0;

        function initEngine() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#070a13');

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(30, 20, 30);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.01; // Impede a câmera de passar para baixo do chão

            // Iluminação Básica do Cenário
            hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.5);
            hemiLight.position.set(0, 50, 0);
            scene.add(hemiLight);

            dirLight = new THREE.DirectionalLight(0xfffdf2, 2.0);
            dirLight.position.set(0, 20, 10);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 30;
            dirLight.shadow.camera.bottom = -30;
            dirLight.shadow.camera.left = -30;
            dirLight.shadow.camera.right = 30;
            dirLight.shadow.camera.near = 0.1;
            dirLight.shadow.camera.far = 150;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.bias = -0.0005;
            scene.add(dirLight);

            // Elementos de Ajuda do Cenário
            gridHelper = new THREE.GridHelper(100, 100, 0x3b82f6, 0x222f4b);
            gridHelper.position.y = -0.01;
            scene.add(gridHelper);

            // Criação do piso padrão intercambiável
            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.8 });
            groundPlane = new THREE.Mesh(groundGeo, groundMat);
            groundPlane.rotation.x = -Math.PI / 2;
            groundPlane.position.y = -0.02;
            groundPlane.receiveShadow = true;
            scene.add(groundPlane);
            groundPlane.visible = false; // Começa desativado por padrão

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            if(renderer && scene && camera) renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Funções de manipulação chamadas via gatilho de sincronização externa
        function updateSolarOrbit(degrees) {
            const rad = THREE.MathUtils.degToRad(degrees);
            const radius = 40;
            if(dirLight) {
                dirLight.position.x = radius * Math.cos(rad);
                dirLight.position.z = radius * Math.sin(rad);
            }
        }

        function updateLighting(dirIntensity, ambientIntensity) {
            if(dirLight) dirLight.intensity = parseFloat(dirIntensity);
            if(hemiLight) hemiLight.intensity = parseFloat(ambientIntensity);
        }

        function updateBackground(hexColor) {
            if(scene) scene.background.set(hexColor);
        }

        function toggleGrid(visible) {
            if(gridHelper) gridHelper.visible = visible;
        }

        function updateGroundMesh(type) {
            if(!groundPlane) return;
            if(type === 'none') {
                groundPlane.visible = false;
            } else if(type === 'grid') {
                groundPlane.visible = true;
                groundPlane.material = new THREE.MeshStandardMaterial({ color: 0x0f172a, roughness: 0.7 });
                groundPlane.receiveShadow = true;
            } else if(type === 'shadow') {
                groundPlane.visible = true;
                groundPlane.material = new THREE.ShadowMaterial({ opacity: 0.4 });
                groundPlane.receiveShadow = true;
            }
        }

        function updateModelTransform() {
            if(currentModel) {
                currentModel.position.set(modelOffset.x, modelOffset.y, modelOffset.z);
            }
        }

        // Leitor de arquivos local (Não passa o binário ao Firebase, carrega localmente em cada tela)
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loading-screen').style.opacity = '1';
            document.getElementById('loading-screen').style.pointerEvents = 'auto';
            document.getElementById('loading-text').innerText = "Carregando maquete 3D local...";

            clearModel();

            const reader = new FileReader();
            reader.onload = function(event) {
                const contents = event.target.result;
                const loader = new THREE.GLTFLoader();
                
                loader.parse(contents, '', function(gltf) {
                    currentModel = gltf.scene;
                    
                    // Configuração de sombras automáticas para a maquete importada
                    currentModel.traverse(function(node) {
                        if (node.isMesh) {
                            node.castShadow = true;
                            node.receiveShadow = true;
                        }
                    });

                    // Aplica estados vigentes imediatamente para evitar pulos visuais
                    currentModel.scale.set(modelScale, modelScale, modelScale);
                    currentModel.rotation.y = THREE.MathUtils.degToRad(modelRotationY);
                    currentModel.position.set(modelOffset.x, modelOffset.y, modelOffset.z);

                    scene.add(currentModel);
                    
                    document.getElementById('loading-screen').style.opacity = '0';
                    document.getElementById('loading-screen').style.pointerEvents = 'none';
                }, function(error) {
                    alert("Erro ao decodificar a maquete 3D. Certifique-se de usar .GLB ou .GLTF válidos.");
                    document.getElementById('loading-screen').style.opacity = '0';
                    document.getElementById('loading-screen').style.pointerEvents = 'none';
                });
            };
            reader.readAsArrayBuffer(file);
        });

        function clearModel() {
            if(currentModel) {
                scene.remove(currentModel);
                currentModel = null;
            }
        }

        // Inicializa o ambiente gráfico assim que a janela carrega
        window.onload = () => { initEngine(); };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // SUA CONFIGURAÇÃO OFICIAL DO APP DO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDFP85eQsSJDrx-klldmjtHe2oEx1jzrns",
            authDomain: "arquitetura-855d5.firebaseapp.com",
            projectId: "arquitetura-855d5",
            storageBucket: "arquitetura-855d5.firebasestorage.app",
            messagingSenderId: "82859867262",
            appId: "1:82859867262:web:cd5ef29765d57fdc5eec2f",
            databaseURL: "https://arquitetura-855d5-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const syncRef = ref(db, 'sceneState');

        const defaultState = {
            solarPos: 90, lightIntensity: 2.0, ambientIntensity: 0.5,
            bgColor: "#070a13", gridVisible: true, groundMesh: "none",
            posX: 0, posY: 0, posZ: 0, scale: 1, rotY: 0
        };

        // Verifica estado inicial e remove tela de loading na primeira carga bem-sucedida
        get(syncRef).then((snapshot) => {
            if (!snapshot.exists()) {
                set(syncRef, defaultState);
            }
            document.getElementById('loading-screen').style.opacity = '0';
            document.getElementById('loading-screen').style.pointerEvents = 'none';
        }).catch((err)=>{
            console.error("Falha ao comunicar com Firebase. Verifique suas regras públicas de leitura/escrita.", err);
            document.getElementById('loading-text').innerText = "Erro de Conexão com Firebase (Verifique as Rules).";
        });

        // Função Global vinculada à interface para salvar dados modificados
        window.dbSave = function(key, value) {
            let parsedValue = value;
            if (value === true || value === false) {
                parsedValue = value;
            } else if(!isNaN(value) && value !== '') {
                parsedValue = parseFloat(value);
            }
            update(syncRef, { [key]: parsedValue }).catch((e) => console.error("Erro ao enviar dados:", e));
        };

        window.triggerResetTransform = function() {
            update(syncRef, { posX: 0, posY: 0, posZ: 0, scale: 1, rotY: 0 });
        };

        window.triggerClearModel = function() {
            if(confirm("Deseja remover o modelo e limpar a cena em todas as telas conectadas?")){
                clearModel();
            }
        };

        // Escuta modificações de qualquer tela externa e sincroniza em tempo real com blindagem
        onValue(syncRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // Sincronizar Iluminação
            if(data.solarPos !== undefined) {
                const el = document.getElementById('prop-solar-pos');
                if(el && document.activeElement !== el) el.value = data.solarPos;
                updateSolarOrbit(data.solarPos);
            }
            if(data.lightIntensity !== undefined) {
                const el = document.getElementById('prop-light');
                if(el && document.activeElement !== el) el.value = data.lightIntensity;
            }
            if(data.ambientIntensity !== undefined) {
                const el = document.getElementById('prop-ambient');
                if(el && document.activeElement !== el) el.value = data.ambientIntensity;
            }
            updateLighting(data.lightIntensity, data.ambientIntensity);

            // Sincronizar Cenário
            if(data.bgColor !== undefined) {
                const el = document.getElementById('prop-bg-color');
                if(el) el.value = data.bgColor;
                updateBackground(data.bgColor);
            }
            if(data.gridVisible !== undefined) {
                const el = document.getElementById('prop-grid-toggle');
                if(el) el.checked = data.gridVisible;
                toggleGrid(data.gridVisible);
            }
            if(data.groundMesh !== undefined) {
                const el = document.getElementById('prop-ground-mesh');
                if(el) el.value = data.groundMesh;
                updateGroundMesh(data.groundMesh);
            }

            // Sincronizar Transformações (Com blindagem estrutural para evitar loops de entrada e quebras)
            if(data.posX !== undefined) {
                const r = document.getElementById('move-x'); const n = document.getElementById('move-x-num');
                if(r && n && document.activeElement !== r && document.activeElement !== n) { r.value = data.posX; n.value = data.posX; }
                modelOffset.x = data.posX;
            }
            if(data.posY !== undefined) {
                const r = document.getElementById('move-y'); const n = document.getElementById('move-y-num');
                if(r && n && document.activeElement !== r && document.activeElement !== n) { r.value = data.posY; n.value = data.posY; }
                modelOffset.y = data.posY;
            }
            if(data.posZ !== undefined) {
                const r = document.getElementById('move-z'); const n = document.getElementById('move-z-num');
                if(r && n && document.activeElement !== r && document.activeElement !== n) { r.value = data.posZ; n.value = data.posZ; }
                modelOffset.z = data.posZ;
            }
            
            if(data.scale !== undefined) {
                const r = document.getElementById('scale-m'); const n = document.getElementById('scale-m-num');
                if(r && n && document.activeElement !== r && document.activeElement !== n) { r.value = data.scale; n.value = data.scale; }
                modelScale = data.scale;
                if(currentModel) currentModel.scale.set(modelScale, modelScale, modelScale);
            }
            if(data.rotY !== undefined) {
                const r = document.getElementById('rot-y'); const n = document.getElementById('rot-y-num');
                if(r && n && document.activeElement !== r && document.activeElement !== n) { r.value = data.rotY; n.value = data.rotY; }
                modelRotationY = data.rotY;
                if(currentModel) currentModel.rotation.y = THREE.MathUtils.degToRad(modelRotationY);
            }

            updateModelTransform();
        });
    </script>
</body>
</html>

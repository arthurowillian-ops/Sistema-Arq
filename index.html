<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de modelos 3D</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.7.4/umd/index.min.js"></script>

    <style>
        :root {
            --bg-main: #0f172a;
            --bg-sidebar: #1e293b;
            --bg-workspace: #070a13;
            --accent-cad: #3b82f6;
            --accent-cad-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --success: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* TELA DE LOADING */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.5s ease; opacity: 1;
        }
        .login-card {
            background: rgba(30, 41, 59, 0.7); padding: 50px; border-radius: 24px;
            border: 1px solid var(--border-color); backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; max-width: 440px; width: 90%;
        }
        .login-card img { width: 130px; height: auto; margin-bottom: 20px; filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.3)); }
        .brand-title { font-size: 26px; font-weight: 800; letter-spacing: 1px; }
        .brand-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 30px; }
        .btn-enter {
            width: 100%; padding: 16px; background: var(--accent-cad); color: white;
            border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer;
            transition: all 0.2s ease; box-shadow: 0 4px 14px rgba(37,99,235,0.4);
        }
        .btn-enter:hover { background: var(--accent-cad-hover); transform: translateY(-2px); }

        /* HEADER PRINCIPAL */
        header { height: 65px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 100; }
        .logo { font-weight: 800; font-size: 15px; letter-spacing: 0.5px; display: flex; align-items: center; gap: 10px; }
        .logo span { background: var(--accent-cad); color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
        .btn-clear { padding: 8px 16px; background: #ef4444; color: white; border: none; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; transition: background 0.2s; }
        .btn-clear:hover { background: #dc2626; }

        /* WORKSPACE UNIFICADO */
        .main-workspace { display: flex; flex: 1; height: calc(100vh - 65px); position: relative; background: var(--bg-workspace); }

        /* VIEWPORT DO MOTOR THREE.JS */
        #render-view { flex: 1; height: 100%; position: relative; }
        #three-container { width: 100%; height: 100%; }

        /* HUD DE STATUS INFORMÁTICO */
        .hud-bar { position: absolute; top: 20px; left: 20px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); padding: 12px 20px; border-radius: 10px; border: 1px solid var(--border-color); font-size: 12px; font-family: monospace; color: var(--text-main); pointer-events: none; z-index: 80; box-shadow: 0 10px 25px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 10px; }
        .hud-bar::before { content: ''; display: inline-block; width: 8px; height: 8px; background: var(--success); border-radius: 50%; }

        /* DROP ZONE / UPLOAD DE ARQUIVOS */
        .upload-zone {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(30, 41, 59, 0.95); border: 2px dashed var(--accent-cad);
            padding: 16px 32px; border-radius: 14px; display: flex; gap: 15px; align-items: center;
            z-index: 100; backdrop-filter: blur(10px); box-shadow: 0 12px 35px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
        }
        .upload-zone label { font-size: 12px; font-weight: 700; color: white; cursor: pointer; background: var(--accent-cad); padding: 8px 16px; border-radius: 6px; transition: background 0.2s; }
        .upload-zone label:hover { background: var(--accent-cad-hover); }
        .upload-zone span { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        #file-input { display: none; }

        /* PAINEL LATERAL DE PROPRIEDADES */
        aside.right-panel { width: 300px; background: var(--bg-sidebar); border-left: 1px solid var(--border-color); padding: 24px; display: flex; flex-direction: column; gap: 24px; z-index: 50; overflow-y: auto; }
        .panel-section-title { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .prop-group { display: flex; flex-direction: column; gap: 8px; }
        .prop-group label { font-size: 12px; font-weight: 600; color: var(--text-muted); display: flex; justify-content: space-between; }
        .prop-group label span { color: var(--accent-cad); font-family: monospace; }
        .prop-select, .prop-input { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 13px; outline: none; background: var(--bg-main); color: var(--text-main); }
        .prop-button { width: 100%; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 8px; background: #0f766e; color: #ecfeff; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; }
        .prop-button:hover { background: #0d9488; transform: translateY(-1px); }
        .prop-button.secondary { background: var(--bg-main); color: var(--text-main); }
        .prop-button.secondary:hover { background: #273449; }
        .axis-row { display: grid; grid-template-columns: 26px 1fr 64px; gap: 8px; align-items: center; }
        .axis-row strong { font-size: 12px; color: var(--text-muted); text-align: center; }
        .axis-row input[type="range"] { width: 100%; }
        .axis-row .prop-input { padding: 8px; text-align: right; }
        
        /* METADADOS DO MODELO */
        .info-card { background: var(--bg-main); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; font-family: monospace; font-size: 11px; color: var(--text-muted); display: flex; flex-direction: column; gap: 6px; }
        .info-card span { color: var(--text-main); }

        /* ==========================================================================
           REGRAS DE ADAPTAÇÃO PARA CELULAR (HORIZONTAL / LANDSCAPE)
           ========================================================================== */
        @media (max-width: 900px) {
            header { height: 50px; padding: 0 12px; }
            header .logo { font-size: 12px; }
            header .logo span { display: none; }
            .main-workspace { height: calc(100vh - 50px); flex-direction: column; }
            
            /* O painel lateral vira uma barra inferior horizontal com scroll de opções */
            aside.right-panel {
                width: 100%;
                height: 140px;
                flex-direction: row;
                border-left: none;
                border-top: 1px solid var(--border-color);
                padding: 12px;
                gap: 20px;
                overflow-x: auto;
                overflow-y: hidden;
            }
            .panel-section-title {
                display: none; /* Esconde títulos longos para poupar espaço */
            }
            .prop-group {
                min-width: 180px;
                justify-content: center;
            }
            .axis-row {
                grid-template-columns: 15px 1fr; /* Remove o input numérico no mobile */
            }
            .axis-row .prop-input { display: none; }
            .info-card { display: none; } /* Oculta dados de polígonos no celular */
            .upload-zone {
                bottom: 10px;
                padding: 8px 16px;
                font-size: 11px;
                width: 85%;
            }
            .upload-zone span { display: none; } /* Encurta o texto do upload */
            .hud-bar { top: 10px; left: 10px; padding: 6px 12px; font-size: 10px; }
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="login-card">
            <img src="https://i.postimg.cc/4N2GLY1R/Gemini-Generated-Image-xkahxoxkahxoxkah-removebg-preview-(1).png" alt="Arthur 3D Logo">
            <h1 class="brand-title">Visualizador de modelos 3D</h1>
            <p class="brand-subtitle">developed by Arthur Willian</p>
            <button class="btn-enter" onclick="enterStudio()">Abrir visualizador</button>
        </div>
    </div>

    <header>
        <div class="logo">Visualizador 3D <span>Maquetes e estudo solar</span></div>
        <div>
            <button class="btn-clear" onclick="clearModel()">Resetar Cena</button>
        </div>
    </header>

    <div class="main-workspace">
        <div id="render-view">
            <div class="hud-bar" id="hud-status">Aguardando importação de maquete (.glb, .fbx)...</div>
            <div id="three-container"></div>

            <div class="upload-zone" id="drop-zone">
                <span>Arraste seu arquivo .glb ou .fbx aqui ou</span>
                <label for="file-input">Procurar Arquivo</label>
                <input type="file" id="file-input" accept=".glb,.fbx" onchange="handleFileSelect(event)">
            </div>
        </div>

        <aside class="right-panel">
            <div class="prop-group">
                <label>Orientação Solar <span id="val-sun-time">12:00</span></label>
                <input type="range" id="prop-solar-pos" min="0" max="180" step="1" value="90" oninput="updateSolarOrbit()">
            </div>
            <div class="prop-group">
                <label>Intensidade (Sol)</label>
                <input type="range" id="prop-light" min="0" max="5" step="0.1" value="2.0" oninput="updateLighting()">
            </div>
            <div class="prop-group">
                <label>Ambiente</label>
                <input type="range" id="prop-ambient" min="0" max="2" step="0.1" value="0.5" oninput="updateLighting()">
            </div>

            <div class="prop-group">
                <label>Fundo do Viewport</label>
                <select id="prop-bg-color" class="prop-select" onchange="updateBackground()">
                    <option value="#070a13" selected>Dark Slate Studio</option>
                    <option value="#1e293b">Industrial Gray</option>
                    <option value="#000000">True Black</option>
                    <option value="#d9efff">Cor do céu</option>
                </select>
            </div>
            <div class="prop-group" style="flex-direction:row; align-items:center; gap:5px;">
                <input type="checkbox" id="prop-grid-toggle" checked onchange="toggleGrid()"> 
                <label for="prop-grid-toggle">Exibir Grade</label>
            </div>
            <div class="prop-group">
                <label>Malha de Terreno</label>
                <select id="prop-ground-mesh" class="prop-select" onchange="updateGroundMesh()">
                    <option value="none" selected>Nenhuma</option>
                    <option value="mesh1">Malha 1 (Gramado)</option>
                    <option value="mesh2">Malha 2 (Projeto)</option>
                </select>
            </div>

            <div class="prop-group">
                <label>Laterais (X)</label>
                <div class="axis-row">
                    <strong>X</strong>
                    <input type="range" id="move-x" min="-500" max="500" step="1" value="0" oninput="syncTransformInput('x', this.value)">
                    <input type="number" class="prop-input" id="move-x-num" min="-500" max="500" step="1" value="0" oninput="syncTransformInput('x', this.value)">
                </div>
            </div>
            <div class="prop-group">
                <label>Altura (Y)</label>
                <div class="axis-row">
                    <strong>Y</strong>
                    <input type="range" id="move-y" min="-500" max="500" step="1" value="0" oninput="syncTransformInput('y', this.value)">
                    <input type="number" class="prop-input" id="move-y-num" min="-500" max="500" step="1" value="0" oninput="syncTransformInput('y', this.value)">
                </div>
            </div>
            <div class="prop-group">
                <label>Profundidade (Z)</label>
                <div class="axis-row">
                    <strong>Z</strong>
                    <input type="range" id="move-z" min="-500" max="500" step="1" value="0" oninput="syncTransformInput('z', this.value)">
                    <input type="number" class="prop-input" id="move-z-num" min="-500" max="500" step="1" value="0" oninput="syncTransformInput('z', this.value)">
                </div>
            </div>
            
            <div class="prop-group">
                <label>Rotação (R)</label>
                <div class="axis-row">
                    <strong>R</strong>
                    <input type="range" id="rot-y" min="0" max="360" step="1" value="0" oninput="syncRotationInput(this.value)">
                    <input type="number" class="prop-input" id="rot-y-num" min="0" max="360" step="1" value="0" oninput="syncRotationInput(this.value)">
                </div>
            </div>
            <div class="prop-group">
                <label>Escala (S)</label>
                <div class="axis-row">
                    <strong>S</strong>
                    <input type="range" id="scale-m" min="0.1" max="5" step="0.05" value="1" oninput="syncScaleInput(this.value)">
                    <input type="number" class="prop-input" id="scale-m-num" min="0.1" max="5" step="0.05" value="1" oninput="syncScaleInput(this.value)">
                </div>
            </div>

            <div class="prop-group">
                <button class="prop-button secondary" onclick="resetModelTransform()">Centralizar</button>
            </div>

            <div class="info-card">
                <div>Arquivo: <span id="info-name">Nenhum</span></div>
                <div>Formato: <span id="info-type">-</span></div>
                <div>Vértices: <span id="info-vertices">0</span></div>
                <div>Polígonos: <span id="info-triangles">0</span></div>
            </div>
        </aside>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFP85eQsSJDrx-klldmjtHe2oEx1jzrns",
            authDomain: "arquitetura-855d5.firebaseapp.com",
            projectId: "arquitetura-855d5",
            storageBucket: "arquitetura-855d5.firebasestorage.app",
            messagingSenderId: "82859867262",
            appId: "1:82859867262:web:cd5ef29765d57fdc5eec2f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Disponibiliza as funções do Firebase globalmente para os inputs HTML usarem
        window.saveConfigToFirebase = function() {
            if (!currentLoadedName) return;
            
            // Higieniza o nome do arquivo removendo caracteres proibidos pelo Firebase (. # $ [ ] / )
            const fileKey = currentLoadedName.replace(/[\.\#\$\[\]\/]/g, "_");

            set(ref(db, 'models/' + fileKey), {
                offsetX: modelOffset.x,
                offsetY: modelOffset.y,
                offsetZ: modelOffset.z,
                scale: modelScale,
                rotationY: modelRotationY,
                solarPos: document.getElementById('prop-solar-pos').value,
                lightIntensity: document.getElementById('prop-light').value,
                ambientIntensity: document.getElementById('prop-ambient').value,
                bgColor: document.getElementById('prop-bg-color').value,
                groundMesh: document.getElementById('prop-ground-mesh').value
            }).then(() => {
                document.getElementById('hud-status').innerText = "Configurações salvas na nuvem.";
            }).catch((error) => {
                console.error("Erro ao salvar:", error);
            });
        };

        window.loadConfigFromFirebase = function(filename) {
            const fileKey = filename.replace(/[\.\#\$\[\]\/]/g, "_");
            const dbRef = ref(db);
            
            get(child(dbRef, `models/${fileKey}`)).then((snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    
                    // Aplica transformações estruturais
                    syncTransformInput('x', data.offsetX ?? 0);
                    syncTransformInput('y', data.offsetY ?? 0);
                    syncTransformInput('z', data.offsetZ ?? 0);
                    syncScaleInput(data.scale ?? 1);
                    syncRotationInput(data.rotationY ?? 0);

                    // Aplica iluminação e ambiente
                    document.getElementById('prop-solar-pos').value = data.solarPos ?? 90;
                    document.getElementById('prop-light').value = data.lightIntensity ?? 2.0;
                    document.getElementById('prop-ambient').value = data.ambientIntensity ?? 0.5;
                    document.getElementById('prop-bg-color').value = data.bgColor ?? "#070a13";
                    document.getElementById('prop-ground-mesh').value = data.groundMesh ?? "none";

                    // Atualiza o motor gráfico baseado nos novos inputs
                    updateSolarOrbit();
                    updateLighting();
                    updateBackground();
                    updateGroundMesh();

                    document.getElementById('hud-status').innerText = `Configuração de [${filename}] recuperada do Firebase!`;
                } else {
                    document.getElementById('hud-status').innerText = "Nenhum ajuste anterior salvo para este modelo.";
                }
            }).catch((error) => {
                console.error(error);
            });
        };
    </script>

    <script>
        let scene, camera, renderer, controls, currentModel, gridHelper, shadowGround, satelliteGround;
        let mainLight, ambientLight, fillLight;
        let currentModelRadius = 50; 
        const modelOffset = { x: 0, y: 0, z: 0 };
        let modelBasePosition = { x: 0, y: 0, z: 0 };
        let modelScale = 1;
        let modelRotationY = 0;
        let currentLoadedName = ""; // Armazena o nome do arquivo atual

        const groundTextures = {
            mesh1: 'https://i.postimg.cc/j5CL4dP6/image.png',
            mesh2: 'https://i.postimg.cc/tJs9mpdz/image.png'
        };

        function enterStudio() {
            const welcome = document.getElementById('welcome-screen');
            welcome.style.opacity = '0';
            setTimeout(() => {
                welcome.style.display = 'none';
                initThreeEngine();
            }, 500);
        }

        function initThreeEngine() {
            const container = document.getElementById('three-container');
            if(!container) return;

            scene = new THREE.Scene();
            scene.background = new THREE.Color('#070a13');

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 5000);
            camera.position.set(40, 40, 60);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 + 0.05; 

            ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            mainLight = new THREE.DirectionalLight(0xffffff, 2.0);
            mainLight.castShadow = true;
            
            mainLight.shadow.mapSize.width = 4096;
            mainLight.shadow.mapSize.height = 4096;
            mainLight.shadow.camera.near = 0.5;
            mainLight.shadow.camera.far = 1000;
            
            setShadowFrustum(100);
            scene.add(mainLight);

            fillLight = new THREE.DirectionalLight(0x94a3b8, 0.4);
            fillLight.position.set(-50, 30, -50);
            scene.add(fillLight);

            gridHelper = new THREE.GridHelper(600, 120, '#3b82f6', '#334155');
            gridHelper.position.y = -0.01; 
            scene.add(gridHelper);

            const groundGeo = new THREE.PlaneGeometry(2000, 2000);
            const groundMat = new THREE.ShadowMaterial();
            groundMat.opacity = 0.6; 
            
            shadowGround = new THREE.Mesh(groundGeo, groundMat);
            shadowGround.rotation.x = -Math.PI / 2;
            shadowGround.receiveShadow = true;
            scene.add(shadowGround);

            updateSolarOrbit();

            window.addEventListener('resize', onWindowResize);
            setupDragAndDrop();
            animate();
        }

        function setShadowFrustum(size) {
            mainLight.shadow.camera.left = -size;
            mainLight.shadow.camera.right = size;
            mainLight.shadow.camera.top = size;
            mainLight.shadow.camera.bottom = -size;
            mainLight.shadow.camera.updateProjectionMatrix();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(controls) controls.update();
            if(renderer && scene && camera) renderer.render(scene, camera);
        }

        function onWindowResize() {
            const container = document.getElementById('three-container');
            if (camera && renderer && container) {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            }
        }

        function updateSolarOrbit() {
            const angleDeg = parseFloat(document.getElementById('prop-solar-pos').value);
            const textTime = document.getElementById('val-sun-time');
            if(!textTime) return;

            if (angleDeg === 0 || angleDeg === 180) textTime.innerText = angleDeg === 0 ? "06:00 (Amanhecer)" : "18:00 (Ocaso)";
            else if (angleDeg === 90) textTime.innerText = "12:00 (Zênite)";
            else {
                const hourCalc = 6 + (angleDeg / 180) * 12;
                const hours = Math.floor(hourCalc);
                const minutes = Math.floor((hourCalc - hours) * 60).toString().padStart(2, '0');
                textTime.innerText = `${hours.toString().padStart(2, '0')}:${minutes}`;
            }

            const angleRad = (angleDeg * Math.PI) / 180;
            const orbitRadius = currentModelRadius * 4;

            mainLight.position.x = Math.cos(angleRad) * orbitRadius;
            mainLight.position.y = Math.sin(angleRad) * orbitRadius;
            mainLight.position.z = (Math.cos(angleRad) * 0.3) * orbitRadius; 
            
            if(window.saveConfigToFirebase) window.saveConfigToFirebase();
        }

        function updateLighting() {
            mainLight.intensity = parseFloat(document.getElementById('prop-light').value);
            ambientLight.intensity = parseFloat(document.getElementById('prop-ambient').value);
            if(window.saveConfigToFirebase) window.saveConfigToFirebase();
        }

        function updateBackground() {
            const color = document.getElementById('prop-bg-color').value;
            if(scene) scene.background = new THREE.Color(color);
            if(renderer) renderer.setClearColor(color, 1);
            if(window.saveConfigToFirebase) window.saveConfigToFirebase();
        }

        function updateGroundMesh() {
            if (!scene) return;
            const selectedOption = document.getElementById('prop-ground-mesh').value;

            if (selectedOption === 'none') {
                if (satelliteGround) { scene.remove(satelliteGround); satelliteGround = null; }
                document.getElementById('hud-status').innerText = "Malha de terreno removida.";
                return;
            }

            const textureUrl = groundTextures[selectedOption];
            const loader = new THREE.TextureLoader();
            loader.load(textureUrl, (texture) => {
                texture.colorSpace = THREE.SRGBColorSpace;
                const groundSize = Math.max(currentModelRadius * 8, 800);

                if (satelliteGround) {
                    satelliteGround.material.map = texture;
                    satelliteGround.material.needsUpdate = true;
                } else {
                    const material = new THREE.MeshLambertMaterial({ map: texture });
                    const geometry = new THREE.PlaneGeometry(groundSize, groundSize);
                    satelliteGround = new THREE.Mesh(geometry, material);
                    satelliteGround.rotation.x = -Math.PI / 2;
                    satelliteGround.position.y = -0.03;
                    satelliteGround.receiveShadow = true;
                    scene.add(satelliteGround);
                }
                if(window.saveConfigToFirebase) window.saveConfigToFirebase();
            });
        }

        function syncTransformInput(axis, value) {
            const numericValue = Number(value) || 0;
            const range = document.getElementById(`move-${axis}`);
            const input = document.getElementById(`move-${axis}-num`);
            if (range) range.value = numericValue;
            if (input) input.value = numericValue;
            modelOffset[axis] = numericValue;
            updateModelTransform();
        }

        function syncScaleInput(value) {
            const numericValue = Math.max(0.1, Number(value) || 1);
            const range = document.getElementById('scale-m');
            const input = document.getElementById('scale-m-num');
            if (range) range.value = numericValue;
            if (input) input.value = numericValue;
            modelScale = numericValue;
            if (currentModel) currentModel.scale.set(modelScale, modelScale, modelScale);
            if(window.saveConfigToFirebase) window.saveConfigToFirebase();
        }

        function syncRotationInput(value) {
            const numericValue = Number(value) || 0;
            const range = document.getElementById('rot-y');
            const input = document.getElementById('rot-y-num');
            if (range) range.value = numericValue;
            if (input) input.value = numericValue;
            modelRotationY = numericValue;
            if (currentModel) currentModel.rotation.y = THREE.MathUtils.degToRad(modelRotationY);
            if(window.saveConfigToFirebase) window.saveConfigToFirebase();
        }

        function updateModelTransform() {
            if (!currentModel) return;
            currentModel.position.set(modelBasePosition.x + modelOffset.x, modelBasePosition.y + modelOffset.y, modelBasePosition.z + modelOffset.z);
            if(window.saveConfigToFirebase) window.saveConfigToFirebase();
        }

        function resetModelTransform() {
            ["x", "y", "z"].forEach((axis) => syncTransformInput(axis, 0));
            syncScaleInput(1);
            syncRotationInput(0);
        }

        function toggleGrid() {
            const isChecked = document.getElementById('prop-grid-toggle').checked;
            if(gridHelper) gridHelper.visible = isChecked;
            if(shadowGround) shadowGround.visible = isChecked; 
        }

        function clearModel() {
            if (currentModel && scene) { scene.remove(currentModel); currentModel = null; }
            currentLoadedName = "";
            resetModelTransform();
            document.getElementById('hud-status').innerText = "Aguardando importação de maquete (.glb, .fbx)...";
        }

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;
            processUploadedFile(file);
        }

        function setupDragAndDrop() {
            const dropZone = document.getElementById('drop-zone');
            if(!dropZone) return;
            window.addEventListener('dragover', (e) => e.preventDefault());
            window.addEventListener('drop', (e) => e.preventDefault());
            dropZone.addEventListener('drop', (e) => {
                const file = e.dataTransfer.files[0];
                if (file) processUploadedFile(file);
            });
        }

        function processUploadedFile(file) {
            const extension = file.name.split('.').pop().toLowerCase();
            if (extension !== 'glb' && extension !== 'fbx') return;

            currentLoadedName = file.name;
            document.getElementById('info-name').innerText = file.name;
            document.getElementById('info-type').innerText = extension.toUpperCase();

            const reader = new FileReader();
            reader.onload = function (e) {
                const arrayBuffer = e.target.result;
                if (extension === 'glb') parseGLB(arrayBuffer, file.name);
                else if (extension === 'fbx') parseFBX(arrayBuffer, file.name);
            };
            reader.readAsArrayBuffer(file);
        }

        function parseGLB(buffer, filename) {
            const loader = new THREE.GLTFLoader();
            loader.parse(buffer, '', (gltf) => { injectModelIntoScene(gltf.scene, filename); });
        }

        function parseFBX(buffer, filename) {
            const loader = new THREE.FBXLoader();
            const object = loader.parse(buffer, '');
            injectModelIntoScene(object, filename);
        }

        function injectModelIntoScene(loadedObject, filename) {
            if (currentModel && scene) scene.remove(currentModel);
            currentModel = loadedObject;

            currentModel.traverse((node) => {
                if (node.isMesh) { node.castShadow = true; node.receiveShadow = true; }
            });

            const box = new THREE.Box3().setFromObject(currentModel);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            currentModelRadius = Math.max(size.x, size.y, size.z) || 1;
            currentModel.position.x += (currentModel.position.x - center.x);
            currentModel.position.y += (currentModel.position.y - box.min.y);
            currentModel.position.z += (currentModel.position.z - center.z);
            modelBasePosition = { x: currentModel.position.x, y: currentModel.position.y, z: currentModel.position.z };
            
            scene.add(currentModel);
            setShadowFrustum(currentModelRadius * 1.5);
            
            // Tenta buscar as configurações salvas no Firebase para este arquivo específico
            if(window.loadConfigFromFirebase) window.loadConfigFromFirebase(filename);
        }
    </script>
</body>
</html>
